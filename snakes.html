<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Devanshu Singh</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg: #0f0e0d;
            --panel: #161412;
            --border: #2a2520;
            --muted: #7a6e64;
        }
        :root.light {
            --bg: #ffffff;
            --panel: #f5f5f5;
            --border: #cccccc;
            --muted: #555555;
        }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            background-color: var(--bg);
            gap: 16px;
            transition: background-color 0.25s;
        }

        .game-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            color: var(--muted);
            letter-spacing: 0.08em;
        }

        #game-board {
            background-color: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.55);
            width: 90vmin;
            height: 90vmin;
            display: grid;
            grid-template-rows: repeat(21, 1fr);
            grid-template-columns: repeat(21, 1fr);
            overflow: hidden;
        }

        .snake {
            background-color: #da7756;
            border: .25vmin solid var(--bg);
            border-radius: 2px;
        }

        .food {
            background-color: #f0c070;
            border: .25vmin solid var(--bg);
            border-radius: 50%;
        }

        #game-over-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            background: rgba(15, 14, 13, 0.85);
            backdrop-filter: blur(6px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }

        #game-over-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .overlay-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(28px, 8vmin, 52px);
            color: #da7756;
            letter-spacing: 0.12em;
            text-transform: lowercase;
        }

        .overlay-score {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(13px, 3.5vmin, 18px);
            color: #7a6e64;
            letter-spacing: 0.08em;
        }

        .overlay-divider {
            width: 180px;
            height: 1px;
            background: #2a2520;
        }

        .btn-restart {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            letter-spacing: 0.08em;
            color: #0f0e0d;
            background: #da7756;
            border: none;
            border-radius: 5px;
            padding: 10px 28px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        .btn-restart:hover {
            background: #e8a87c;
            transform: translateY(-1px);
        }
    </style>

    <script src="game.js" defer type="module"></script>
    <script>
        (function() {
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.add('light');
            }
            window.addEventListener('message', e => {
                if (e.data && e.data.theme) {
                    document.documentElement.classList.toggle('light', e.data.theme === 'light');
                }
            });
            window.focus();
        }());
    </script>
</head>
<body>
    <div class="game-label">score: <span id="score">0</span></div>
    <div id="game-board"></div>

    <div id="game-over-overlay">
        <div class="overlay-title">game over</div>
        <div class="overlay-score">score: <span id="final-score">0</span></div>
        <div class="overlay-divider"></div>
        <button class="btn-restart" onclick="window.location='./snakes.html'">play again</button>
    </div>

</body>
</html>
