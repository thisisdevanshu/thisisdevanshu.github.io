<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Devanshu Singh</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            background-color: #0f0e0d;
            gap: 16px;
        }

        .game-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            color: #7a6e64;
            letter-spacing: 0.08em;
        }

        .game-label a {
            color: #da7756;
            text-decoration: none;
        }

        #game-board {
            background-color: #161412;
            border: 1px solid #2a2520;
            border-radius: 8px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.55);
            width: 90vmin;
            height: 90vmin;
            display: grid;
            grid-template-rows: repeat(21, 1fr);
            grid-template-columns: repeat(21, 1fr);
            overflow: hidden;
        }

        .snake {
            background-color: #da7756;
            border: .25vmin solid #0f0e0d;
            border-radius: 2px;
        }

        .food {
            background-color: #f0c070;
            border: .25vmin solid #0f0e0d;
            border-radius: 50%;
        }

        #game-over-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            background: rgba(15, 14, 13, 0.85);
            backdrop-filter: blur(6px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }

        #game-over-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .overlay-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(28px, 8vmin, 52px);
            color: #da7756;
            letter-spacing: 0.12em;
            text-transform: lowercase;
        }

        .overlay-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(11px, 3vmin, 14px);
            color: #7a6e64;
            letter-spacing: 0.08em;
        }

        .overlay-divider {
            width: 180px;
            height: 1px;
            background: #2a2520;
        }

        .overlay-actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .btn-restart {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            letter-spacing: 0.08em;
            color: #0f0e0d;
            background: #da7756;
            border: none;
            border-radius: 5px;
            padding: 10px 28px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        .btn-restart:hover {
            background: #e8a87c;
            transform: translateY(-1px);
        }

        .btn-back {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #7a6e64;
            text-decoration: none;
            letter-spacing: 0.06em;
            transition: color 0.15s;
        }

        .btn-back:hover { color: #e8ddd0; }
    </style>

    <script src="game.js" defer type="module">

    </script>
</head>
<body>
    <div class="game-label"><a href="/">← back</a></div>
    <div id="game-board"></div>
    <div class="game-label">arrow keys to move</div>

    <div id="game-over-overlay">
        <div class="overlay-title">game over</div>
        <div class="overlay-divider"></div>
        <div class="overlay-actions">
            <button class="btn-restart" onclick="window.location='./snakes.html'">play again</button>
            <a class="btn-back" href="/">← back to terminal</a>
        </div>
    </div>

</body>
</html>
